name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore .\MCPServer.slnx

      - name: Build
        shell: pwsh
        run: dotnet build .\MCPServer.slnx -c Debug --no-restore

      - name: Test stable suites
        shell: pwsh
        run: >
          dotnet test .\MCPServer.slnx -c Debug --no-build
          --filter "FullyQualifiedName!~McpClientConsoleSmokeTests&FullyQualifiedName!~StreamableHttpMcpServerServiceTests"
