name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Restore
        shell: pwsh
        run: dotnet restore .\MCPServer.slnx

      - name: Build
        shell: pwsh
        run: dotnet build .\MCPServer.slnx -c Debug --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test .\MCPServer.slnx -c Debug --no-build

      - name: Sync Python bridge
        shell: pwsh
        run: .\scripts\Sync-PythonBridge.ps1 -Configuration Release -RuntimeIdentifier win-x64 -BuildWheel

      - name: Install Python wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem .\python\dist\*.whl | Select-Object -First 1
          python -m pip install --force-reinstall --no-deps $wheel.FullName

      - name: Python wheel smoke test
        shell: pwsh
        run: .\scripts\Smoke-PythonWheel.ps1

      - name: Python tests
        shell: pwsh
        run: python -m unittest discover -s python\tests
